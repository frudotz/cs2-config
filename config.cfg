// AIM
sensitivity 0.52
zoom_sensitivity_ratio 1.0
m_pitch 0.022
m_yaw 0.022

// CROSSHAIR
cl_crosshairstyle 4
cl_crosshaircolor 1
cl_crosshairalpha 255
cl_crosshairsize 1
cl_crosshairgap -4
cl_crosshairthickness 1
cl_crosshairdot 0
cl_crosshair_drawoutline 0
cl_crosshair_sniper_width 1

// VIEWMODEL
viewmodel_fov 68
viewmodel_offset_x 2.5
viewmodel_offset_y 2
viewmodel_offset_z -2

// RADAR
cl_radar_always_centered 1
cl_radar_rotate 1
cl_radar_scale 0.7
cl_radar_icon_scale_min 0.6

// GAMEPLAY
cl_showloadout 1
cl_use_opens_buy_menu 1
cl_sniper_auto_rezoom 1
cl_silencer_mode 1

// BINDS
bind "`" "toggleconsole"
bind "MWHEELUP" "+jump"
bind "MWHEELDOWN" "+jump"
bind "c" "+turnleft"
bind "v" "+voicerecord"
bind "ALT" "+cl_show_team_equipment"
bind "ENTER" "+attack"
bind "MOUSE1" "+attack"
bind "MOUSE4" "+voicerecord"
